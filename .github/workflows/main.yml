name: 每日官網自動化測試

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-auto-test:
    runs-on: windows-latest 

    steps:
      - name: 0. 清除舊的快取檔案
        run: |
          # 使用相對路徑或內建變數，不要寫死 C:\Users\...
          if (Test-Path ".pytest_cache") {
            Remove-Item -Recurse -Force ".pytest_cache"
          }
        shell: powershell
        continue-on-error: true

      - name: 1. 取得最新程式碼
        uses: actions/checkout@v4
        with:
          clean: false

      - name: 3. 安裝 Python 依賴套件
        run: python -m pip install -r requirements.txt

      - name: 4. 安裝 Allure 命令列工具
        run: npm install -g allure-commandline --save-dev

      - name: 5. 執行自動化測試 (無頭模式)
        run: |
          python -m pytest tests/test_pc_homepage.py tests/test_pc_navbar_states.py tests/test_pc_topup_store.py -p no:cacheprovider --clean-alluredir --alluredir=allure-results
        env:
          # 務必確保這裡有從 Secrets 讀取帳密，否則無頭模式下登入會失敗
          BEANFUN_ACCOUNT: ${{ secrets.BEANFUN_ACCOUNT }}
          BEANFUN_PASSWORD: ${{ secrets.BEANFUN_PASSWORD }}
          BEANFUN_OTP: ${{ secrets.BEANFUN_OTP }}
        
      - name: 6. 產生與打包 Allure 報告
        run: |
          allure generate allure-results -o allure-report --clean
          py -m pip install allure-combine
          allure-combine allure-report

      - name: 7. 寄送測試報告
        env:
          REPORT_SENDER_EMAIL: ${{ secrets.REPORT_SENDER_EMAIL }}
          REPORT_SENDER_PWD: ${{ secrets.REPORT_SENDER_PWD }}
          REPORT_RECEIVER_EMAIL: ${{ secrets.REPORT_RECEIVER_EMAIL }}
          PYTHONIOENCODING: utf-8
        run: py send_report.py

      - name: 8. 上傳測試報告
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: allure-cloud-report
          path: allure-report/
