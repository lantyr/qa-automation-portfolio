name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .

  # ── API tests ────────────────────────────────────────────────────────────────
  api-tests:
    name: API tests (reqres.in)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run API tests
        run: pytest web_pack/tests/api -m api --alluredir=allure-results -q
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results
          retention-days: 7

  # ── PC UI tests (Playwright) ─────────────────────────────────────────────────
  web-ui-tests:
    name: PC UI tests (Playwright Chromium)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
      - name: Run PC UI tests
        env:
          BROWSER_MODE: headless
        run: pytest web_pack/tests/ui -m "ui and web" --alluredir=allure-results -q
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-web-ui
          path: allure-results
          retention-days: 7

  # ── Mobile UI tests (Selenium) ───────────────────────────────────────────────
  mobile-ui-tests:
    name: Mobile UI tests (Selenium iPhone emulation)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run Mobile UI tests
        env:
          BROWSER_MODE: headless
        run: pytest mobile_pack/tests/ui -m "ui and mobile" --alluredir=allure-results -q
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile-ui
          path: allure-results
          retention-days: 7

  # ── Allure report ─────────────────────────────────────────────────────────────
  allure-report:
    name: Generate Allure report
    runs-on: ubuntu-latest
    needs: [api-tests, web-ui-tests, mobile-ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results
        continue-on-error: true
      - name: Download PC UI results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-web-ui
          path: allure-results
        continue-on-error: true
      - name: Download Mobile UI results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-mobile-ui
          path: allure-results
        continue-on-error: true
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20
      - name: Publish Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
